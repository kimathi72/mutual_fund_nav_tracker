services:

  postgres:
    image: postgres:16
    container_name: mf_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "${DATABASE_PORT}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mf_redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      args:
        UID: ${UID}
        GID: ${GID}

    user: "${UID}:${GID}"
    container_name: mf_rails

    command: bundle exec rails server -b 0.0.0.0

    working_dir: /app

    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle

    ports:
      - "3000:3000"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      RAILS_ENV: ${RAILS_ENV}

      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_TEST_NAME: ${DATABASE_TEST_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}

      REDIS_URL: ${REDIS_URL}

      OPENFIGI_API_KEY: ${OPENFIGI_API_KEY}
      YAHOO_FINANCE_BASE_URL: ${YAHOO_FINANCE_BASE_URL}

  sidekiq:
    build:
      context: .
      args:
        UID: ${UID}
        GID: ${GID}

    user: "${UID}:${GID}"
    container_name: mf_sidekiq

    command: bundle exec sidekiq

    working_dir: /app

    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      RAILS_ENV: ${RAILS_ENV}

      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_TEST_NAME: ${DATABASE_TEST_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}

      REDIS_URL: ${REDIS_URL}

      OPENFIGI_API_KEY: ${OPENFIGI_API_KEY}
      YAHOO_FINANCE_BASE_URL: ${YAHOO_FINANCE_BASE_URL}

volumes:
  postgres_data:
  bundle_cache: