services:

  postgres:
    image: postgres:16
    container_name: mf_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "${DATABASE_PORT}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5


  redis:
    image: redis:7-alpine
    container_name: mf_redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  web:
    build:
      context: .
      args:
        UID: ${UID}
        GID: ${GID}

    container_name: mf_rails
    user: "${UID}:${GID}"

    working_dir: /app

    command: bundle exec rails server -b 0.0.0.0

    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - ./exports:/app/exports

    ports:
      - "3000:3000"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      RAILS_ENV: ${RAILS_ENV}

      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_TEST_NAME: ${DATABASE_TEST_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      REDIS_URL: ${REDIS_URL}

      OPENFIGI_API_KEY: ${OPENFIGI_API_KEY}
      YAHOO_FINANCE_BASE_URL: ${YAHOO_FINANCE_BASE_URL}

      ML_SERVICE_URL: http://ml:8000


  sidekiq:
    build:
      context: .
      args:
        UID: ${UID}
        GID: ${GID}

    container_name: mf_sidekiq
    user: "${UID}:${GID}"

    working_dir: /app

    command: bundle exec sidekiq -C config/sidekiq.yml

    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - ./exports:/app/exports

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      RAILS_ENV: ${RAILS_ENV}

      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_TEST_NAME: ${DATABASE_TEST_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}

      REDIS_URL: ${REDIS_URL}

      OPENFIGI_API_KEY: ${OPENFIGI_API_KEY}
      YAHOO_FINANCE_BASE_URL: ${YAHOO_FINANCE_BASE_URL}

      ML_SERVICE_URL: http://ml:8000


  ml:
    build:
      context: ./ml_service

    container_name: mf_ml

    restart: unless-stopped

    working_dir: /app

    ports:
      - "8000:8000"

    volumes:
      - ./ml_service:/app
      - ./exports:/app/exports

    environment:
      DATASET_PATH: /app/exports/training_dataset.csv
      MODEL_PATH: /app/models/model.pkl


volumes:
  postgres_data:
  bundle_cache: